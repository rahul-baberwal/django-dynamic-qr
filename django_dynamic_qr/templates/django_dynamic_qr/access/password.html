{% extends "django_dynamic_qr/base.html" %}
{% block title %}Password Required{% endblock %}
{% block content %}
<div style="padding-top:80px;text-align:center;">
  <div style="font-size:48px;margin-bottom:16px;">🔒</div>
  <h1 style="font-size:22px;font-weight:700;margin-bottom:8px;">Password Required</h1>
  <p style="color:var(--text-muted);margin-bottom:28px;">This QR code is protected. Enter the password to continue.</p>
  <form method="POST" action="">
    {% csrf_token %}
    <input type="password" name="password" placeholder="Enter password"
      style="width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;margin-bottom:12px;outline:none;" autofocus />
    <button type="submit" class="btn btn-primary">Unlock →</button>
  </form>
</div>
{% endblock %}
